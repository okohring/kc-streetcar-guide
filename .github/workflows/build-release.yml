name: Build and Release Plugin

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, without the leading v. Example: 1.0.7'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare simplified release build
        run: python3 .github/pre-release-cleanup.py

      - name: Build and release plugin
        run: bash .github/build-and-release.sh "$VERSION"
        env:
          VERSION: ${{ github.event.inputs.version }}
          GH_TOKEN: ${{ github.token }}
