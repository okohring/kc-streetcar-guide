name: Build and Release Plugin

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, without the leading v. Example: 1.3.1'
        required: true
        type: string
  push:
    branches:
      - main
    paths:
      - release-version.txt

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="$(tr -d '[:space:]' < release-version.txt)"
          fi

          VERSION="${VERSION#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid semantic version: $VERSION"
            exit 1
          fi

          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Keep admin checkboxes normal width
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('kc-streetcar-guide.php')
          content = path.read_text()
          old = ".kcsg-admin-field input, .kcsg-admin-field select, .kcsg-admin-field textarea { width: 100%; max-width: 100%; }"
          new = ".kcsg-admin-field input:not([type=checkbox]), .kcsg-admin-field select, .kcsg-admin-field textarea { width: 100%; max-width: 100%; }\n            .kcsg-admin-field input[type=checkbox], .kcsg-featured-toggle input[type=checkbox] { width: auto !important; max-width: none !important; min-width: 0 !important; margin: 0 6px 0 0 !important; }"
          content = content.replace(old, new)
          path.write_text(content)
          PY

      - name: Build and create release
        run: bash .github/build-and-release.sh "${{ steps.version.outputs.value }}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Restore Amenities screen tools
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('build/kc-streetcar-guide/kc-streetcar-guide.php')
          content = path.read_text()

          old_save_hook = "        add_action('admin_post_kcsg_save_advanced_settings', array($this, 'save_advanced_settings'));\n"
          content = content.replace(old_save_hook, '')

          anchor = "        add_action('admin_menu', array($this, 'add_stop_photos_page'));\n"
          required_hooks = (
              "        add_action('admin_post_kcsg_save_guide_settings', array($this, 'save_guide_settings'));\n",
              "        add_action('all_admin_notices', array($this, 'render_amenities_screen_tools'));\n",
          )

          missing_hooks = ''.join(hook for hook in required_hooks if hook not in content)
          if missing_hooks:
              if anchor not in content:
                  raise SystemExit('Could not find the Streetcar Guide admin hook anchor.')
              content = content.replace(anchor, anchor + missing_hooks, 1)

          path.write_text(content)

          for hook in required_hooks:
              if hook not in content:
                  raise SystemExit('A required Amenities screen hook is missing.')
          PY

      - name: Finalize Explore KC release
        run: bash .github/finalize-release.sh "${{ steps.version.outputs.value }}"
        env:
          GH_TOKEN: ${{ github.token }}
