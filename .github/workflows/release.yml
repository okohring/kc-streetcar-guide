name: Build and Release Plugin

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, without the leading v. Example: 0.7.9'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          TAG="v${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Prepare release build
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          perl -0pi -e "s/Version:\s*[0-9.]+/Version: $VERSION/" kc-streetcar-guide.php
          perl -0pi -e "s/const VERSION = '[^']+';/const VERSION = '$VERSION';/" kc-streetcar-guide.php

          python3 - <<'PY'
          from pathlib import Path
          import re

          php = Path('kc-streetcar-guide.php')
          content = php.read_text()
          content = content.replace("        add_filter('upgrader_post_install', array($this, 'rename_release_folder'), 10, 3);\n", "")
          content = re.sub(r"\n    public function rename_release_folder\(\$response, \$hook_extra, \$result\) \{.*?\n    \}\n", "\n", content, flags=re.S)
          php.write_text(content)

          js_path = Path('assets/kcsg-frontend.js')
          js = js_path.read_text()

          js = js.replace(
              "    var buttons = Array.prototype.slice.call(guide.querySelectorAll('[data-kcsg-category]'));\n"
              "    var resetButton = guide.querySelector('[data-kcsg-reset]');\n"
              "    var results = guide.querySelector('[data-kcsg-results]');",
              "    var buttons = Array.prototype.slice.call(guide.querySelectorAll('[data-kcsg-category]'));\n"
              "    var resetButton = guide.querySelector('[data-kcsg-reset]');\n"
              "    var categoryKey = guide.querySelector('.kcsg-category-key');\n"
              "    var resetRow = guide.querySelector('.kcsg-reset-row');\n"
              "    var stopSelect = null;\n"
              "    var results = guide.querySelector('[data-kcsg-results]');"
          )

          if 'function buildControlBar()' not in js:
              build_control_bar = r'''
    function buildControlBar() {
      if (!categoryKey || categoryKey.closest('.kcsg-controls')) return;

      var controls = document.createElement('div');
      controls.className = 'kcsg-controls';

      var categoryGroup = document.createElement('div');
      categoryGroup.className = 'kcsg-control-group kcsg-control-group--categories';

      var categoryLabel = document.createElement('div');
      categoryLabel.className = 'kcsg-control-label';
      categoryLabel.textContent = 'Categories';

      categoryKey.parentNode.insertBefore(controls, categoryKey);
      controls.appendChild(categoryGroup);
      categoryGroup.appendChild(categoryLabel);
      categoryGroup.appendChild(categoryKey);

      if (resetButton) {
        resetButton.textContent = 'reset';
        categoryKey.appendChild(resetButton);
      }

      if (resetRow && resetRow.parentNode) {
        resetRow.parentNode.removeChild(resetRow);
      }

      var stopGroup = document.createElement('div');
      stopGroup.className = 'kcsg-control-group kcsg-control-group--stop';

      var selectId = 'kcsg-stop-select-' + Math.random().toString(36).slice(2, 9);
      var stopLabelNode = document.createElement('label');
      stopLabelNode.className = 'kcsg-control-label';
      stopLabelNode.setAttribute('for', selectId);
      stopLabelNode.textContent = 'Streetcar stop';

      stopSelect = document.createElement('select');
      stopSelect.className = 'kcsg-stop-select';
      stopSelect.setAttribute('id', selectId);
      stopSelect.setAttribute('data-kcsg-stop-select', '');

      var placeholder = document.createElement('option');
      placeholder.value = '';
      placeholder.textContent = 'Select streetcar stop';
      stopSelect.appendChild(placeholder);

      Object.keys(data.stops || {}).forEach(function (stopId) {
        var option = document.createElement('option');
        option.value = stopId;
        option.textContent = data.stops[stopId];
        stopSelect.appendChild(option);
      });

      stopGroup.appendChild(stopLabelNode);
      stopGroup.appendChild(stopSelect);
      controls.appendChild(stopGroup);
    }
'''
              js = js.replace("    function setActiveButton(slug) {", build_control_bar + "\n    function setActiveButton(slug) {")

          if 'function setStopSelect(stopId)' not in js:
              js = js.replace(
                  "    function setActiveStop(stopId) {\n"
                  "      stopGroups.forEach(function (group) {\n"
                  "        var isActive = group.id === stopId;\n"
                  "        group.classList.toggle('is-active', isActive);\n"
                  "      });\n"
                  "    }",
                  "    function setActiveStop(stopId) {\n"
                  "      stopGroups.forEach(function (group) {\n"
                  "        var isActive = group.id === stopId;\n"
                  "        group.classList.toggle('is-active', isActive);\n"
                  "      });\n"
                  "    }\n\n"
                  "    function setStopSelect(stopId) {\n"
                  "      if (!stopSelect) return;\n"
                  "      stopSelect.value = stopId || '';\n"
                  "    }"
              )

          js = js.replace(
              "      setActiveStop(state.stop);\n"
              "      updateStopMuting();",
              "      setActiveStop(state.stop);\n"
              "      setStopSelect(state.mode === 'stop' ? state.stop : '');\n"
              "      updateStopMuting();"
          )

          js = js.replace(
              "    buttons.forEach(function (button) {",
              "    buildControlBar();\n\n"
              "    buttons.forEach(function (button) {"
          )

          js = js.replace(
              "    if (resetButton) {\n"
              "      resetButton.addEventListener('click', function () {",
              "    if (stopSelect) {\n"
              "      stopSelect.addEventListener('change', function () {\n"
              "        var stopId = stopSelect.value;\n"
              "        if (stopId) {\n"
              "          chooseStop(stopId);\n"
              "          return;\n"
              "        }\n"
              "        state.category = 'all';\n"
              "        state.stop = null;\n"
              "        state.mode = 'all';\n"
              "        render();\n"
              "      });\n"
              "    }\n\n"
              "    if (resetButton) {\n"
              "      resetButton.addEventListener('click', function () {"
          )

          js_path.write_text(js)

          css_path = Path('assets/kcsg-frontend.css')
          css_extra = r'''

/* Release tweak: hide the redundant external-link icon in the stop photo tracker header. */
.kcsg-stop-photo .kcsg-live-link {
  display: none !important;
}

/* Release tweak: add a crisp white border around stop photos. */
.kcsg-stop-photo {
  border: 2px solid #ffffff !important;
}

/* Release tweak: visitor guide controls UI overhaul. */
.kcsg-header h2 {
  margin-bottom: 0 !important;
}

.kcsg-header p {
  margin-top: 0 !important;
}

.kcsg-reset-row {
  display: none !important;
}

.kcsg-controls {
  display: grid !important;
  grid-template-columns: minmax(0, 1fr) minmax(220px, 300px);
  align-items: end;
  column-gap: 18px;
  row-gap: 10px;
  width: 100%;
  margin: 10px 0 12px !important;
  padding: 0 !important;
}

.kcsg-control-group {
  min-width: 0;
}

.kcsg-control-label {
  display: block;
  margin: 0 0 6px !important;
  padding: 0 !important;
  color: var(--kcsg-muted);
  font-size: 11px;
  font-weight: 850;
  line-height: 1;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.kcsg-category-key {
  align-items: center;
  margin: 0 !important;
}

.kcsg-category-key .kcsg-reset {
  appearance: none;
  border: 0 !important;
  border-radius: 0 !important;
  background: transparent !important;
  box-shadow: none !important;
  color: #d6422d !important;
  padding: 0 0 0 2px !important;
  font-size: 13px;
  font-weight: 800;
  line-height: 1;
  text-transform: lowercase;
  text-decoration: none !important;
}

.kcsg-category-key .kcsg-reset:hover,
.kcsg-category-key .kcsg-reset:focus-visible {
  background: transparent !important;
  border-color: transparent !important;
  color: #a82f20 !important;
  transform: none !important;
  text-decoration: underline !important;
  text-underline-offset: 3px;
  outline: 0;
}

.kcsg-stop-select {
  appearance: none;
  width: 100%;
  min-height: 36px;
  border: 1px solid var(--kcsg-line);
  border-radius: 12px;
  background-color: #ffffff;
  color: var(--kcsg-blue-dark);
  cursor: pointer;
  font: inherit;
  font-size: 14px;
  font-weight: 650;
  line-height: 1.2;
  padding: 8px 36px 8px 11px;
  box-shadow: 0 6px 14px rgba(9, 60, 87, 0.04);
}

.kcsg-stop-select:hover,
.kcsg-stop-select:focus-visible {
  border-color: var(--kcsg-blue);
  outline: 0;
}

.kcsg-layout {
  align-items: start !important;
  margin-top: 0 !important;
}

.kcsg-guide.is-stop-with-photo .kcsg-results-heading {
  display: none !important;
}

.kcsg-stop-photo {
  margin-top: 0 !important;
}

@media (max-width: 760px) {
  .kcsg-controls {
    grid-template-columns: 1fr;
  }
}
'''
          css_path.write_text(css_path.read_text() + css_extra)
          PY

      - name: Verify plugin header version
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! grep -q "Version: $VERSION" kc-streetcar-guide.php; then
            echo "Plugin header version does not match release version $VERSION."
            exit 1
          fi
          if ! grep -q "const VERSION = '$VERSION'" kc-streetcar-guide.php; then
            echo "KCSG_Plugin::VERSION does not match release version $VERSION."
            exit 1
          fi
          if grep -q "upgrader_post_install" kc-streetcar-guide.php; then
            echo "Unsafe post-install updater hook is still present."
            exit 1
          fi
          if ! grep -q "kcsg-stop-select" assets/kcsg-frontend.js; then
            echo "Stop select UI patch was not applied."
            exit 1
          fi

      - name: Build plugin ZIP
        shell: bash
        run: |
          rm -rf build
          mkdir -p build/kc-streetcar-guide
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='build' \
            --exclude='.DS_Store' \
            ./ build/kc-streetcar-guide/
          cd build
          zip -r kc-streetcar-guide.zip kc-streetcar-guide

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" build/kc-streetcar-guide.zip --clobber
          else
            gh release create "$TAG" build/kc-streetcar-guide.zip \
              --title "KC Streetcar Guide $VERSION" \
              --notes "KC Streetcar Guide $VERSION\n\n- Reworked the top controls with category and streetcar stop labels.\n- Added a streetcar stop dropdown beside the category buttons.\n- Moved reset into the category row as a red text link.\n- Tightened header spacing and aligned selected-stop photo/list content with the map.\n- Kept the 2px white stop-photo border and safe updater packaging." \
              --target "$GITHUB_SHA" \
              --latest
          fi
